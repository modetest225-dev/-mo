<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محادثة P2P سرية</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 100%; max-width: 400px; height: 400px; border: 1px solid #444; background: #222; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 70%; margin: 5px; }
        button { padding: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        .info { font-size: 0.8em; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>🔒 محادثة مباشرة (طرف لطرف)</h2>
    <div class="info">هذه المحادثة لا تُخزن في أي مكان وتُحذف بمجرد الإغلاق.</div>

    <!-- عرض المعرف الخاص بك -->
    <div id="my-id-display">جاري توليد معرفك الخاص...</div>
    
    <div style="margin: 20px 0;">
        <input type="text" id="other-peer-id" placeholder="أدخل معرف الطرف الآخر">
        <button onclick="connectToPeer()">اتصال</button>
    </div>

    <div id="chat-box"></div>

    <div>
        <input type="text" id="message-input" placeholder="اكتب رسالتك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        let peer = new Peer(); // إنشاء اتصال جديد
        let conn;

        // 1. عرض المعرف الخاص بك للطرف الآخر
        peer.on('open', (id) => {
            document.getElementById('my-id-display').innerHTML = `معرفك هو: <b style="color:#00ff00">${id}</b> (أرسله للطرف الآخر)`;
        });

        // 2. استقبال الاتصال من الطرف الآخر
        peer.on('connection', (c) => {
            conn = c;
            setupChat();
        });

        // 3. وظيفة الاتصال بالطرف الآخر
        function connectToPeer() {
            const peerId = document.getElementById('other-peer-id').value;
            conn = peer.connect(peerId);
            setupChat();
        }

        function setupChat() {
            conn.on('open', () => {
                appendMessage("<i>متصل الآن.. يمكنك الدردشة!</i>");
                
                conn.on('data', (data) => {
                    appendMessage("<b>الطرف الآخر:</b> " + data);
                });
            });
        }

        // 4. إرسال الرسالة
        function sendMessage() {
            const msgInput = document.getElementById('message-input');
            const msg = msgInput.value;
            if (conn && conn.open) {
                conn.send(msg);
                appendMessage("<b>أنت:</b> " + msg);
                msgInput.value = "";
            } else {
                alert("لم يتم الاتصال بعد!");
            }
        }

        function appendMessage(html) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div>${html}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
